<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squeegee Manifest App</title>
    <style>
        /* Estilos generales y reinicio */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #17212e; /* Color de fondo base (oscuro) */
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Estilo base para botones */
        .btn {
            background-color: #4e7a9e;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
        }
        .btn:hover {
            background-color: #5f8eb5;
        }
        .btn.active {
            background-color: #3ba4f9; /* Botón activo (Home) */
        }

        /* Barra de navegación superior */
        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background-color: #17212e;
            border-bottom: 2px solid #0f1620;
        }
        .top-nav .mid-btns {
            display: flex;
            gap: 10px;
        }
        .right-btns {
            display: flex;
            align-items: center;
        }
        .profile-dot {
            height: 15px;
            width: 15px;
            background-color: #0f1620;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* Barras decorativas (los recuadros azules arriba y abajo del centro) */
        .deco-container {
            display: flex;
            padding: 10px 15px;
            background-color: #1e2d3d;
            gap: 10px;
        }
        .deco-spacer {
            width: 130px; /* Espacio reservado sobre la barra lateral */
        }
        .deco-boxes {
            display: flex;
            flex: 1;
            gap: 10px;
        }
        .deco-box {
            flex: 1;
            height: 30px;
            background-color: #4e7a9e;
            opacity: 0.6;
        }

        /* Área principal (Barra lateral + Contenido) */
        .main-area {
            display: flex;
            flex: 1;
            background-color: #17212e;
        }

        /* Barra lateral izquierda */
        .sidebar {
            width: 145px;
            background-color: #1e2d3d;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-right: 2px solid #0f1620;
        }
        .sidebar .btn {
            width: 100%;
            padding: 12px 5px;
            font-size: 16px;
        }

        /* Contenido central */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #213547; /* Fondo azul un poco más claro para el centro */
            border-left: 2px solid #0f1620;
            border-right: 2px solid #0f1620;
        }

        /* Cabecera del contenido (Título y botones de acción) */
        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 2px solid #0f1620;
        }
        .title-area h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        .title-area p {
            font-size: 16px;
            font-weight: bold;
            color: #d1d5d8;
        }
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .action-btns .btn {
            padding: 10px 15px;
        }

        /* Sección de estadísticas */
        .stats-section {
            display: flex;
            flex: 1;
        }
        .stat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px solid #0f1620;
        }
        .stat-box:last-child {
            border-right: none;
        }
        .stat-number {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1;
        }
        .stat-label {
            font-size: 18px;
            font-weight: bold;
        }

        /* Barra inferior */
        .bottom-bar {
            padding: 10px 15px;
            background-color: #1e2d3d;
            border-top: 2px solid #0f1620;
        }
        
    </style>
</head>
<body>

    <!-- Navegación Superior -->
    <div class="top-nav">
        <button class="btn">Squeegee Manifest App</button>
        <div class="mid-btns">
            <button class="btn">Settings</button>
            <button class="btn">Support</button>
            <button class="btn">Quick Info</button>
            <button class="btn">V 0.0.0.0</button>
        </div>
        <div class="right-btns">
            <button class="btn"><span class="profile-dot"></span> ADGB</button>
        </div>
    </div>

    <!-- Bloques Decorativos Superiores -->
    <div class="deco-container">
        <div class="deco-spacer"></div>
        <div class="deco-boxes">
            <div class="deco-box"></div>
            <div class="deco-box"></div>
            <div class="deco-box"></div>
            <div class="deco-box"></div>
        </div>
    </div>

    <!-- Área Principal -->
    <div class="main-area">
        <!-- Barra Lateral -->
        <div class="sidebar">
            <button class="btn active">Home</button>
            <button class="btn">Library</button>
            <button class="btn">Store</button>
            <button class="btn">Workshop</button>
            <button class="btn">Plugin</button>
            <button class="btn">Leaderboard</button>
            <button class="btn">Hubcaptools</button>
        </div>

        <!-- Contenido Central -->
        <div class="content">
            <!-- Título y Botones -->
            <div class="content-header">
                <div class="title-area">
                    <h1>Squeegee Manifest App</h1>
                    <p>Steam Depot Manager & Tools</p>
                </div>
                <div class="action-btns">
                    <button class="btn">Launch Steam</button>
                    <button class="btn">Check For Updates</button>
                    <button class="btn">Restart Steam</button>
                    <button class="btn">Current Mode:HubcapTools</button>
                </div>
            </div>

            <!-- Estadísticas -->
            <div class="stats-section">
                <div class="stat-box">
                    <div class="stat-number">000</div>
                    <div class="stat-label">Games In Library</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">000</div>
                    <div class="stat-label">Lua Files</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">0B</div>
                    <div class="stat-label">Total Size</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">00/25</div>
                    <div class="stat-label">API Calls Today</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bloques Decorativos Inferiores -->
    <div class="deco-container">
        <div class="deco-spacer"></div>
        <div class="deco-boxes">
            <div class="deco-box"></div>
            <div class="deco-box"></div>
            <div class="deco-box"></div>
            <div class="deco-box"></div>
        </div>
    </div>

    <!-- Barra Inferior -->
    <div class="bottom-bar">
        <button class="btn">Lua Installer</button>
    </div>

</body>
</html>
